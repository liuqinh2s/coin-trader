# =============================================================================
#  交易参数配置
# =============================================================================

# 杠杆倍数
leverage: 10

# 最小下单金额 (USDT)
min_usdt: 10

# 最大持仓数
max_long_positions: 3

# =============================================================================
#  风控参数
# =============================================================================

# 最大回撤阈值（超过则进入关停模式）
max_drawdown_threshold: 0.10

# 24h 内爆仓次数阈值
max_burst_count: 2

# 自动交易策略（只做多，日K/周K布林趋势）
auto_trade:
  risk_per_trade: 0.02
  max_total_risk: 0.10
  max_symbol_notional_pct: 0.20
  atr_length: 14
  atr_stop_multi: 1.2
  atr_min: 0.001
  market_cap_min: 5000000
  market_cap_max: 1000000000
  market_cap_cache_ttl_seconds: 86400
  min_quote_volume_1d: 500000
  low_60d_min_pct: 0.01
  low_60d_max_pct: 0.20

# 持仓超时止损
long_timeout_loss_days: 1       # 持仓超过24小时未盈利则平仓
long_timeout_profit_days: 2     # 持仓超过48小时盈利未达标则平仓
long_min_profit_pct: 0.06       # 止盈最低触发标准（48小时判断用）

# 分段止盈：每上涨2%，卖出剩余持仓的2%；下一段涨幅基于上一段触发价计算
partial_take_profit_step_pct: 0.02
partial_take_profit_sell_pct: 0.02

# 阶梯回撤止盈配置: [涨幅倍数, 允许回撤比例]
trailing_stop_tiers:
  - [1.50, 0.50]
  - [1.40, 0.20]
  - [1.30, 0.15]
  - [1.25, 0.13]
  - [1.20, 0.10]
  - [1.13, 0.08]
  - [1.06, 0.06]

# =============================================================================
#  防追高参数
# =============================================================================

# 7 日涨幅上限倍数
max_7d_gain_mult: 2.7

# 布林带宽度上限倍数
max_boll_width_mult: 2.7

# 收盘价相对上轨上限倍数
max_close_above_upper_mult: 1.1

# =============================================================================
#  成交量异动参数
# =============================================================================

volume_anomaly:
  # 15 分钟
  min_vol_15m_short: 100000
  min_vol_15m_long: 40000
  # 1 小时
  min_vol_1h: 400000
  # 4 小时
  min_vol_4h: 800000

# =============================================================================
