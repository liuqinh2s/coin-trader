# =============================================================================
#  数据获取
# =============================================================================

# 默认 K 线周期
default_cycles:
  - "1M"
  - "1W"
  - "1D"
  - "4H"
  - "1H"
  - "15m"

# 默认 K 线根数
default_kline_limit: "200"

# 异步并发数
max_concurrent_requests: 10

# =============================================================================
#  策略扫描间隔（分钟）
# =============================================================================

scan_interval_minutes: 15

# =============================================================================
#  带单配置（Copy Trading）
# =============================================================================

# 是否启用带单模式（需要先在 Bitget 申请成为交易员）
copy_trading_enabled: false

# =============================================================================
#  均线周期
# =============================================================================
ma_periods:
  - 5
  - 10
  - 15
  - 20
  - 30
  - 40
  - 80
  - 160
