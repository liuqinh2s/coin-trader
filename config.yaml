# =============================================================================
#  交易参数配置
# =============================================================================

# 杠杆倍数
leverage: 10

# 最小下单金额 (USDT)
min_usdt: 10

# 最大持仓数
max_long_positions: 5

# =============================================================================
#  风控参数
# =============================================================================

# 最大回撤阈值（超过则进入关停模式）
max_drawdown_threshold: 0.10

# 24h 内爆仓次数阈值
max_burst_count: 2

# 自动交易策略（选币沿用日K/周K布林趋势，下单方向为做多）
auto_trade:
  # 每个仓位的风险金额占总权益比例（ATR动态仓位：size = equity*risk_per_trade / (close - stop_price)）
  # stop_price = BB_MID - ATR*atr_stop_multi，跌到止损线正好亏 risk_per_trade 比例资金，但不实际挂止损
  risk_per_trade: 0.02
  min_tag_count: 7
  # max_total_risk 已停用（不再按止损距离做总风险闸门）
  max_total_risk: 0.10
  max_symbol_notional_pct: 0.20
  atr_length: 14
  atr_stop_multi: 1.2
  atr_min: 0.001
  liquidation_stop_buffer_pct: 0.005
  liquidation_margin_buffer_pct: 0.004
  market_cap_max: 1000000000
  market_cap_cache_ttl_seconds: 86400
  min_quote_volume_1d: 500000

# =============================================================================
#  做空策略（通过环境变量 SHORT_STRATEGY=true 切换启用）
#  选币：复用做多策略的「龙头币」「小市值」两个标签 —— 取「非龙头 且 小市值」，
#        再随机挑选 random_pick 个做空。
#  出场：开仓时挂交易所预设止盈单，价格下跌 take_profit_pct 即自动平空止盈；
#        不设止损，10x 杠杆用爆仓兜底。
# =============================================================================
short_trade:
  # 单币保证金占总权益比例（保证金口径）：margin = equity * risk_per_trade
  # 名义敞口 = margin * leverage = equity * risk_per_trade * 10
  risk_per_trade: 0.02
  # 同时最多持有的空单数
  max_short_positions: 5
  # 每轮随机挑选的做空币数量
  random_pick: 5
  # 止盈幅度：价格下跌该比例即止盈（挂交易所预设止盈单）
  take_profit_pct: 0.03
  # 小市值门槛（复用做多口径）：0 < 市值 < market_cap_max
  market_cap_max: 1000000000
  market_cap_cache_ttl_seconds: 86400

# 止盈/止损后冷却（小时）：该币平仓后此时间内不再买入
rebuy_cooldown_hours: 2

# 阶梯回撤止盈配置: [涨幅倍数, 允许回撤比例]
# 做多策略：盘中每分钟监控持仓价格，浮盈达到对应阶梯后回撤超过允许比例即平仓。
# 不设止损，10x 杠杆跌 10% 爆仓兜底。
trailing_stop_tiers:
  - [1.30, 0.10]
  - [1.20, 0.10]
  - [1.15, 0.05]
  - [1.11, 0.01]
  - [1.08, 0.02]
  - [1.06, 0.03]
unprofitable_exit_days: 2
weak_gain_exit_days: 3
weak_gain_threshold_pct: 0.06

# =============================================================================
#  防追高参数（阈值为「允许的最大涨幅」，0.30 表示 +30%）
# =============================================================================

# 近 3 日相对 3 天前收盘价的涨幅上限
max_3d_gain: 0.30

# 近 7 日相对区间最低价的涨幅上限
max_7d_gain: 0.60

# 收盘价相对 30 日均线的偏离上限
max_ma30_dev: 0.35

# 近半年相对区间最低价的涨幅上限（历史 >=180 日时生效）
max_180d_gain: 1.5

# 布林带宽度上限倍数（上轨 < 下轨 × 该值）
max_boll_width_mult: 2.0

# 收盘价相对上轨上限倍数
max_close_above_upper_mult: 1.02

# =============================================================================
#  成交量异动参数
# =============================================================================

volume_anomaly:
  # 15 分钟
  min_vol_15m_short: 100000
  min_vol_15m_long: 40000
  # 1 小时
  min_vol_1h: 400000
  # 4 小时
  min_vol_4h: 800000

