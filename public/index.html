<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合约代币扫描器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #0a0e17;
            color: #e1e8f0;
            min-height: 100vh;
        }

        #app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 24px 0 16px;
        }

        h1 {
            font-size: 28px;
            color: #f0b90b;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #7a8599;
            font-size: 13px;
            margin-top: 4px;
        }

        .filter-desc {
            color: #5a6a80;
            font-size: 11px;
            margin-top: 6px;
            line-height: 1.6;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .stats-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 16px 0;
        }

        .stat {
            background: #141924;
            border: 1px solid #1e2a3a;
            border-radius: 8px;
            padding: 12px 20px;
            text-align: center;
            min-width: 130px;
        }

        .stat .label {
            display: block;
            font-size: 11px;
            color: #5a6a80;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .stat .val {
            display: block;
            font-size: 18px;
            font-weight: 700;
            color: #e1e8f0;
            margin-top: 4px;
        }

        .stat .val.up {
            color: #00c853;
        }

        .stat .val.down {
            color: #ff4d4f;
        }

        .stat .val.neutral {
            color: #f0b90b;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 16px 0;
        }

        button {
            background: #1e2a3a;
            color: #e1e8f0;
            border: 1px solid #2a3a50;
            border-radius: 6px;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 13px;
            transition: all .2s;
        }

        button:hover {
            background: #f0b90b;
            color: #0a0e17;
            border-color: #f0b90b;
        }

        button.active {
            background: #f0b90b;
            color: #0a0e17;
            border-color: #f0b90b;
        }

        .tag-bar {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 12px 0;
            padding: 12px;
            background: #141924;
            border: 1px solid #1e2a3a;
            border-radius: 8px;
        }

        .tag-filter {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #2a3a50;
            background: #1e2a3a;
            color: #e1e8f0;
            transition: all .2s;
            user-select: none;
        }

        .tag-filter:hover {
            border-color: #f0b90b;
            color: #f0b90b;
        }

        .tag-filter.active {
            background: #f0b90b;
            color: #0a0e17;
            border-color: #f0b90b;
        }

        .tag-filter .count {
            background: rgba(255, 255, 255, 0.15);
            padding: 1px 6px;
            border-radius: 10px;
            font-size: 10px;
        }

        .tag-filter.active .count {
            background: rgba(0, 0, 0, 0.2);
        }

        .tag-filter.disabled {
            cursor: default;
            opacity: 0.6;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th {
            background: #141924;
            color: #7a8599;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .5px;
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #1e2a3a;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 10px 8px;
            border-bottom: 1px solid #111827;
            font-size: 13px;
        }

        tr:hover td {
            background: #111827;
        }

        .symbol-link {
            color: #8ecdf7;
            text-decoration: none;
            font-weight: 600;
        }

        .symbol-link:hover {
            text-decoration: underline;
        }

        .symbol-actions {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn,
        .bitget-link,
        .sentiment-link {
            display: inline-block;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid #2a3a50;
            background: #1e2a3a;
            color: #7a8599;
            text-decoration: none;
            transition: all .2s;
            white-space: nowrap;
        }

        .copy-btn:hover,
        .bitget-link:hover,
        .sentiment-link:hover {
            background: #f0b90b;
            color: #0a0e17;
            border-color: #f0b90b;
        }

        .sentiment-score {
            display: inline-flex;
            min-width: 44px;
            justify-content: center;
            padding: 3px 8px;
            border-radius: 999px;
            border: 1px solid #2a3a50;
            background: #111827;
            color: #7a8599;
            font-size: 12px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .sentiment-score.has-score {
            border-color: rgba(0, 200, 83, .45);
            background: rgba(0, 200, 83, .12);
            color: #55e58d;
        }

        .sentiment-meta {
            margin-top: 4px;
            color: #7a8599;
            font-size: 11px;
            line-height: 1.4;
        }

        .price-up {
            color: #00c853;
        }

        .price-down {
            color: #ff4d4f;
        }

        .tag {
            display: inline-block;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            margin: 1px 3px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
        }

        .tag:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        .tag-volume {
            background: #e040fb;
            color: #fff;
        }

        .tag-trend {
            background: #2196f3;
            color: #fff;
        }

        .tag-daily-trend {
            background: #1976d2;
            color: #fff;
        }

        .tag-safe {
            background: #00c853;
            color: #fff;
        }

        .tag-short-pullback {
            background: #c2185b;
            color: #fff;
        }

        .tag-fundrate {
            background: #00bcd4;
            color: #fff;
        }

        .tag-leading {
            background: #ff6d00;
            color: #fff;
        }

        .tag-fairy {
            background: #7c4dff;
            color: #fff;
        }

        .tag-volatile {
            background: #26a69a;
            color: #fff;
        }

        .tag-strong-start {
            background: #ff4081;
            color: #fff;
        }

        .tag-small-cap {
            background: #00897b;
            color: #fff;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #5a6a80;
        }

        .hidden {
            display: none !important;
        }

        .history-panel {
            background: #141924;
            border: 1px solid #1e2a3a;
            border-radius: 8px;
            padding: 16px;
            margin: 12px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-panel h3 {
            color: #f0b90b;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .hist-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid #1e2a3a;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
        }

        .hist-row:hover {
            background: #1e2a3a;
        }

        .hist-row .ht {
            color: #7a8599;
        }

        .hist-row .hv {
            color: #f0b90b;
            font-weight: 600;
        }

        .search-box {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            margin: 12px 0;
        }

        .search-box input {
            background: #141924;
            border: 1px solid #2a3a50;
            border-radius: 6px;
            padding: 8px 14px;
            color: #e1e8f0;
            font-size: 13px;
            width: 260px;
            outline: none;
            transition: border-color .2s;
        }

        .search-box input:focus {
            border-color: #f0b90b;
        }

        .search-box input::placeholder {
            color: #5a6a80;
        }

        .search-results {
            background: #141924;
            border: 1px solid #1e2a3a;
            border-radius: 8px;
            padding: 16px;
            margin: 12px 0;
            max-height: 500px;
            overflow-y: auto;
        }

        .search-results h3 {
            color: #f0b90b;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .search-result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid #1e2a3a;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .search-result-item:hover {
            background: #1e2a3a;
        }

        .search-result-item .sr-symbol {
            color: #8ecdf7;
            font-weight: 600;
            font-size: 13px;
            min-width: 120px;
        }

        .search-result-item .sr-time {
            color: #7a8599;
        }

        .search-result-item .sr-price {
            color: #e1e8f0;
        }

        .search-result-item .sr-tags {
            flex-basis: 100%;
            margin-top: 4px;
        }

        .search-loading {
            color: #5a6a80;
            font-size: 12px;
            text-align: center;
            padding: 12px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #f0b90b;
            color: #0a0e17;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            z-index: 999;
            transition: opacity .3s;
        }

        /* Mobile card layout */
        .card-list {
            display: none;
        }

        @media (max-width: 900px) {
            #tokenTable table {
                display: none;
            }

            .card-list {
                display: block;
            }

            .token-card {
                background: #141924;
                border: 1px solid #1e2a3a;
                border-radius: 10px;
                padding: 14px;
                margin-bottom: 10px;
            }

            .card-top {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                margin-bottom: 8px;
                gap: 8px;
                flex-wrap: wrap;
            }

            .card-symbol {
                font-size: 16px;
                font-weight: 700;
                color: #8ecdf7;
            }

            .card-price-wrap {
                display: flex;
                align-items: baseline;
                gap: 6px;
                margin-left: auto;
                font-variant-numeric: tabular-nums;
            }

            .card-price-val {
                font-size: 15px;
                font-weight: 600;
                white-space: nowrap;
            }

            .card-change {
                font-size: 12px;
                font-weight: 600;
                white-space: nowrap;
            }

            .card-tags {
                margin: 8px 0;
            }

            .card-meta {
                display: flex;
                justify-content: space-between;
                font-size: 11px;
                color: #5a6a80;
                margin-top: 6px;
            }

            .card-prices {
                display: flex;
                align-items: center;
                gap: 16px;
                font-size: 12px;
                color: #7a8599;
                margin-top: 6px;
                font-variant-numeric: tabular-nums;
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <header>
            <h1>🔍 合约代币扫描器</h1>
            <p class="subtitle">每15分钟扫描 · Bitget USDT永续 · 多周期趋势共振选币</p>
            <p class="filter-desc">
                默认不选中标签，按标签数量降序展示前10个<br>
                可选标签：小市值 · 波动充足 · 趋势共振 · 日K趋势向上 · 成交量异动 · 负资金费率 · 龙头币 · 仙人指路 · 未追高<br>
                默认选出的10个币会同步读取 Crypto Mint 消息面评分（仅展示，不参与排序）
            </p>
        </header>

        <div class="stats-bar" id="statsBar">
            <div class="stat">
                <span class="label">扫描时间</span>
                <span class="val" id="scanTime">--</span>
            </div>
            <div class="stat">
                <span class="label">交易对总数</span>
                <span class="val" id="totalSymbols">--</span>
            </div>
            <div class="stat">
                <span class="label">可分析</span>
                <span class="val" id="validSymbols">--</span>
            </div>
            <div class="stat">
                <span class="label">筛选通过</span>
                <span class="val" id="filteredCount">--</span>
            </div>
            <div class="stat">
                <span class="label">消息评分</span>
                <span class="val" id="sentimentCount">--</span>
            </div>
            <div class="stat">
                <span class="label">耗时</span>
                <span class="val" id="elapsed">--</span>
            </div>
        </div>

        <div class="actions">
            <button id="btnHistory" onclick="toggleHistory()">📋 历史记录</button>
            <button id="btnLatest" onclick="goLatest()">回到当前</button>
            <button onclick="clearFilter()">🏠 恢复默认</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索代币名称或标签（如 BTC、盘整突破）…" aria-label="搜索代币名称或标签">
            <button onclick="doSearch()">🔍 搜索历史</button>
            <button id="btnClearSearch" onclick="clearSearch()" class="hidden">✕ 清除</button>
        </div>

        <div id="searchResults" class="search-results hidden"></div>

        <div id="tagBar" class="tag-bar hidden"></div>

        <div id="historyPanel" class="history-panel hidden">
            <h3>扫描历史</h3>
            <div id="historyList"></div>
        </div>

        <div id="tokenTable">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>交易对</th>
                        <th>价格</th>
                        <th>24h涨跌</th>
                        <th>24h高/低</th>
                        <th>资金费率</th>
                        <th>ATR</th>
                        <th>消息评分</th>
                        <th>加分项标签</th>
                    </tr>
                </thead>
                <tbody id="tokenBody"></tbody>
            </table>
            <p id="noData" class="no-data hidden">当前标签下暂无符合条件的代币。</p>
            <div id="cardList" class="card-list"></div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script>
        let currentData = null;
        const DEFAULT_FILTER = [];
        let activeTagFilter = [...DEFAULT_FILTER];
        let historyVisible = false;
        const cache = {};
        const CRYPTO_MINT_BASE = 'https://liuqinh2s.github.io/crypto-mint/';
        let cryptoMintPollTimer = null;

        // 标签样式映射
        const TAG_STYLES = {
            '趋势共振': 'tag-trend',
            '日K趋势向上': 'tag-daily-trend',
            '成交量异动': 'tag-volume',
            '未追高': 'tag-safe',
            '负费率': 'tag-fundrate',
            '龙头币': 'tag-leading',
            '仙人指路': 'tag-fairy',
            '波动充足': 'tag-volatile',
            '强势启动': 'tag-strong-start',
            '小市值': 'tag-small-cap',
        };

        // 不支持点击筛选的标签（非筛币条件）
        const NON_FILTERABLE = new Set([]);

        function getTagClass(tag) {
            for (const [key, cls] of Object.entries(TAG_STYLES)) {
                if (tag.startsWith(key) || tag.includes(key)) return cls;
            }
            return 'tag-volatile';
        }

        function getTagKey(tag) {
            for (const key of Object.keys(TAG_STYLES)) {
                if (tag.startsWith(key) || tag.includes(key)) return key;
            }
            return tag;
        }

        function isFilterable(tag) {
            return !NON_FILTERABLE.has(getTagKey(tag));
        }

        async function cachedFetch(url, bustCache) {
            if (!bustCache && cache[url]) return cache[url];
            const fetchUrl = bustCache ? url + (url.includes('?') ? '&' : '?') + '_t=' + Date.now() : url;
            const res = await fetch(fetchUrl);
            const data = await res.json();
            cache[url] = data;
            return data;
        }

        async function loadLatest() {
            try {
                const data = await cachedFetch('/api/latest', true);
                currentData = data;
                renderData(data);
                hydrateCryptoMintScores(data, false).then(() => startCryptoMintPolling(data));
            } catch (e) { console.error(e); }
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function fmtPrice(p) {
            if (!p || p === 0) return '--';
            if (p < 0.0001) return p.toFixed(8);
            if (p < 1) return p.toFixed(6);
            if (p < 100) return p.toFixed(4);
            return p.toFixed(2);
        }

        function renderData(data) {
            document.getElementById('scanTime').textContent = data.scanTime || '--';
            document.getElementById('totalSymbols').textContent =
                data.totalSymbols != null ? data.totalSymbols.toLocaleString() : '--';
            document.getElementById('validSymbols').textContent =
                data.validSymbols != null ? data.validSymbols.toLocaleString() : '--';
            document.getElementById('filteredCount').textContent =
                data.filteredCount != null ? data.filteredCount.toLocaleString() : '--';
            const sentimentCount = data.sentimentCount != null ? data.sentimentCount.toLocaleString() : '--';
            const sentimentDispatched = data.sentimentDispatched || 0;
            document.getElementById('sentimentCount').textContent =
                sentimentDispatched > 0 ? `${sentimentCount} / 提交${sentimentDispatched}` : sentimentCount;
            document.getElementById('elapsed').textContent =
                data.elapsed != null ? data.elapsed + 's' : '--';

            let tokens = (data.tokens || []).map(t => ({
                ...t,
                tags: t.tags || [],
            }));
            const tagBarTokens = [...tokens].sort((a, b) => b.tags.length - a.tags.length);

            // 应用当前选中的标签筛选
            if (activeTagFilter.length > 0) {
                tokens = tokens.filter(t =>
                    activeTagFilter.every(f =>
                        t.tags.some(tag => getTagKey(tag) === f)
                    )
                );
            }

            // 按标签数量降序排列
            tokens.sort((a, b) => b.tags.length - a.tags.length);

            // 无标签筛选时只展示前10
            if (activeTagFilter.length === 0) {
                tokens = tokens.slice(0, 10);
            }

            renderTagBar(tagBarTokens);
            renderTable(tokens);
            renderCards(tokens);

            const noData = document.getElementById('noData');
            if (tokens.length === 0) {
                noData.classList.remove('hidden');
            } else {
                noData.classList.add('hidden');
            }
        }

        function symbolToSentimentToken(symbol) {
            return String(symbol || '').replace(/(USDT|USDC|FDUSD|USD)$/i, '').toUpperCase();
        }

        async function hydrateCryptoMintScores(data, showUpdateToast = true) {
            const tokens = data.tokens || [];
            const pending = tokens.filter(t =>
                t.fetch_sentiment &&
                getSentimentScore(t) < 0
            );
            if (!pending.length) return 0;

            try {
                const res = await fetch(`${CRYPTO_MINT_BASE}data/search-index.json?_t=${Date.now()}`, { cache: 'no-store' });
                if (!res.ok) return 0;
                const index = await res.json();
                const byToken = {};
                for (const item of index.results || []) {
                    if (item.token) byToken[String(item.token).toUpperCase()] = item;
                }

                let updated = 0;
                for (const t of pending) {
                    const token = symbolToSentimentToken(t.symbol);
                    const item = byToken[token];
                    if (!item || item.score === null || item.score === undefined) continue;
                    t.sentiment = {
                        token,
                        available: true,
                        score: Number(item.score),
                        label: item.label || '',
                        action: item.action || '',
                        name: item.name || '',
                        generated_at: item.generatedAt || '',
                        detail_url: `${CRYPTO_MINT_BASE}${token}`,
                    };
                    updated += 1;
                }

                if (updated > 0) {
                    data.sentimentCount = tokens.filter(t => getSentimentScore(t) >= 0).length;
                    renderData(data);
                    if (showUpdateToast) showToast(`已补充 ${updated} 个消息评分`);
                }
                return updated;
            } catch (e) {
                console.warn('Crypto Mint score refresh failed', e);
                return 0;
            }
        }

        function hasPendingCryptoMintScores(data) {
            return (data.tokens || []).some(t =>
                t.fetch_sentiment &&
                getSentimentScore(t) < 0
            );
        }

        function startCryptoMintPolling(data) {
            clearInterval(cryptoMintPollTimer);
            if (!hasPendingCryptoMintScores(data)) return;

            let attempts = 0;
            const maxAttempts = 40;
            cryptoMintPollTimer = setInterval(async () => {
                attempts += 1;
                await hydrateCryptoMintScores(data, true);
                if (!hasPendingCryptoMintScores(data) || attempts >= maxAttempts) {
                    clearInterval(cryptoMintPollTimer);
                    cryptoMintPollTimer = null;
                }
            }, 15000);
        }

        function renderTagBar(tokens) {
            const tagBar = document.getElementById('tagBar');
            const tagCounts = {};
            for (const t of tokens) {
                for (const tag of t.tags) {
                    const key = getTagKey(tag);
                    tagCounts[key] = (tagCounts[key] || 0) + 1;
                }
            }
            if (Object.keys(tagCounts).length === 0) {
                tagBar.classList.add('hidden');
                return;
            }
            tagBar.classList.remove('hidden');

            for (const key of activeTagFilter) {
                if (tagCounts[key] === undefined) tagCounts[key] = 0;
            }
            const sorted = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);
            tagBar.innerHTML = sorted.map(([key, count]) => {
                const isActive = activeTagFilter.includes(key) ? ' active' : '';
                const filterable = !NON_FILTERABLE.has(key);
                const onclick = filterable ? `onclick="filterByTag('${esc(key)}', event)"` : '';
                const disabledCls = filterable ? '' : ' disabled';
                const title = filterable
                    ? `title="点击切换筛选: ${esc(key)}"`
                    : `title="${esc(key)}（全局条件，不可筛选）"`;
                return `<span class="tag-filter${isActive}${disabledCls}" ${onclick} ${title}>
          ${esc(key)} <span class="count">${count}</span>
        </span>`;
            }).join('');
        }

        function filterByTag(tagKey, event) {
            const idx = activeTagFilter.indexOf(tagKey);
            if (idx >= 0) {
                activeTagFilter.splice(idx, 1);
            } else {
                activeTagFilter.push(tagKey);
            }
            if (currentData) renderData(currentData);
        }

        function clearFilter() {
            activeTagFilter = [...DEFAULT_FILTER];
            if (currentData) renderData(currentData);
            showToast('已清除所有标签筛选');
        }

        function buildTags(tags) {
            return tags.map(tag => {
                const cls = getTagClass(tag);
                const key = getTagKey(tag);
                const filterable = isFilterable(tag);
                const onclick = filterable
                    ? `onclick="event.stopPropagation();selectSingleTag('${esc(key)}')"` : '';
                const title = filterable
                    ? `title="点击筛选: ${esc(key)}"` : `title="${esc(tag)}"`;
                return `<span class="tag ${cls}" ${onclick} ${title}>${esc(tag)}</span>`;
            }).join('');
        }

        function getSentimentScore(t) {
            const score = t.sentiment && t.sentiment.score;
            return score === null || score === undefined || Number.isNaN(Number(score)) ? -1 : Number(score);
        }

        function buildSentiment(t) {
            const s = t.sentiment || {};
            const score = getSentimentScore(t);
            const scoreText = score >= 0 ? score : '待分析';
            const scoreCls = score >= 0 ? 'sentiment-score has-score' : 'sentiment-score';
            const label = score >= 0
                ? [s.label, s.action].filter(Boolean).join(' · ')
                : '等待 Crypto Mint 发布';
            const token = String((s.token || t.symbol || '')).replace(/(USDT|USDC|FDUSD|USD)$/i, '').toUpperCase();
            const url = s.detail_url || `https://liuqinh2s.github.io/crypto-mint/${token}`;
            return `<div>
              <a class="${scoreCls}" href="${esc(url)}" target="_blank" rel="noopener">${esc(scoreText)}</a>
              <div class="sentiment-meta">${label ? esc(label) : 'Crypto Mint'}<br><a class="sentiment-link" href="${esc(url)}" target="_blank" rel="noopener">消息面</a></div>
            </div>`;
        }

        function selectSingleTag(tagKey) {
            activeTagFilter = [tagKey];
            if (currentData) renderData(currentData);
        }

        function renderTable(tokens) {
            const tbody = document.getElementById('tokenBody');
            tbody.innerHTML = tokens.map((t, i) => {
                const changeCls = t.change_pct >= 0 ? 'price-up' : 'price-down';
                const changeSign = t.change_pct >= 0 ? '+' : '';
                const frColor = t.fund_rate < 0 ? 'color:#00bcd4' : t.fund_rate > 0.0003 ? 'color:#ff4d4f' : '';
                const sym = esc(t.symbol);
                const tvUrl = `https://www.tradingview.com/chart/?symbol=BITGET:${sym}.P`;
                const bgUrl = `https://www.bitget.com/futures/usdt/${sym}`;
                return `<tr>
          <td>${i + 1}</td>
          <td>
            <span class="symbol-actions">
              <a class="symbol-link" href="${tvUrl}" target="_blank" rel="noopener">${sym}</a>
              <span class="copy-btn" onclick="copyText('${sym}')">复制</span>
              <a class="bitget-link" href="${bgUrl}" target="_blank" rel="noopener">Bitget</a>
            </span>
          </td>
          <td>${fmtPrice(t.price)}</td>
          <td class="${changeCls}">${changeSign}${t.change_pct}%</td>
          <td style="font-size:11px;color:#7a8599">
            H: ${fmtPrice(t.high_24h)}<br>L: ${fmtPrice(t.low_24h)}
          </td>
          <td style="${frColor}">${(t.fund_rate * 100).toFixed(4)}%</td>
          <td style="font-size:11px;color:#7a8599">${t.atr != null ? fmtPrice(t.atr) : '--'}</td>
          <td>${buildSentiment(t)}</td>
          <td>${buildTags(t.tags)}</td>
        </tr>`;
            }).join('');
        }

        function renderCards(tokens) {
            const cardList = document.getElementById('cardList');
            cardList.innerHTML = tokens.map((t, i) => {
                const changeCls = t.change_pct >= 0 ? 'price-up' : 'price-down';
                const changeSign = t.change_pct >= 0 ? '+' : '';
                const sym = esc(t.symbol);
                const tvUrl = `https://www.tradingview.com/chart/?symbol=BITGET:${sym}.P`;
                const bgUrl = `https://www.bitget.com/futures/usdt/${sym}`;
                return `<div class="token-card">
          <div class="card-top">
            <span class="symbol-actions">
              <a class="symbol-link card-symbol" href="${tvUrl}" target="_blank">${sym}</a>
              <span class="copy-btn" onclick="copyText('${sym}')">复制</span>
              <a class="bitget-link" href="${bgUrl}" target="_blank">Bitget</a>
            </span>
            <span class="card-price-wrap">
              <span class="card-price-val">${fmtPrice(t.price)}</span>
              <span class="card-change ${changeCls}">${changeSign}${t.change_pct}%</span>
            </span>
          </div>
          <div class="card-tags">${buildTags(t.tags)}</div>
          <div class="card-prices">
            <span>H: ${fmtPrice(t.high_24h)}</span>
            <span>L: ${fmtPrice(t.low_24h)}</span>
            <span>费率: ${(t.fund_rate * 100).toFixed(4)}%</span>
            <span>ATR: ${t.atr != null ? fmtPrice(t.atr) : '--'}</span>
          </div>
          <div class="card-prices">
            <span>消息评分: ${buildSentiment(t)}</span>
          </div>
          <div class="card-meta"><span>#${i + 1}</span></div>
        </div>`;
            }).join('');
        }

        // ── 历史记录 ──
        async function toggleHistory() {
            const panel = document.getElementById('historyPanel');
            historyVisible = !historyVisible;
            if (historyVisible) {
                panel.classList.remove('hidden');
                try {
                    const rows = await cachedFetch('/api/history');
                    const list = document.getElementById('historyList');
                    if (!rows || rows.length === 0) {
                        list.innerHTML = '<p style="color:#5a6a80;font-size:12px;">暂无历史记录。</p>';
                        return;
                    }
                    list.innerHTML = rows.map(r => `
            <div class="hist-row" onclick="loadScan(${r.id})">
              <span class="ht">${esc(r.scan_time || '--')}</span>
              <span>交易对: ${r.total_symbols || 0} | 筛选: <span class="hv">${r.filtered_count || 0}</span></span>
            </div>
          `).join('');
                } catch (e) { console.error(e); }
            } else {
                panel.classList.add('hidden');
            }
        }

        async function loadScan(id) {
            try {
                const data = await cachedFetch('/api/scan/' + id);
                currentData = data;
                activeTagFilter = [...DEFAULT_FILTER];
                renderData(data);
                hydrateCryptoMintScores(data, false).then(() => startCryptoMintPolling(data));
                showToast('已加载扫描 #' + id);
            } catch (e) { showToast('加载失败'); }
        }

        async function goLatest() {
            try {
                const data = await cachedFetch('/api/latest', true);
                currentData = data;
                activeTagFilter = [...DEFAULT_FILTER];
                renderData(data);
                hydrateCryptoMintScores(data, false).then(() => startCryptoMintPolling(data));
                showToast('已回到最新数据');
            } catch (e) { showToast('加载失败'); }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => showToast('已复制: ' + text)).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('已复制: ' + text);
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 1500);
        }

        // ── 搜索功能 ──
        let searchActive = false;
        let searchIndex = null;

        document.getElementById('searchInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') doSearch();
        });

        async function loadSearchIndex() {
            if (searchIndex) return searchIndex;
            searchIndex = await cachedFetch('/api/search-index');
            return searchIndex;
        }

        async function doSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) { showToast('请输入代币名称或标签'); return; }
            const queryUpper = query.toUpperCase();

            const panel = document.getElementById('searchResults');
            panel.classList.remove('hidden');
            panel.innerHTML = '<p class="search-loading">正在加载搜索索引…</p>';

            try {
                const index = await loadSearchIndex();
                const results = [];
                for (const [symbol, records] of Object.entries(index)) {
                    const symbolMatch = symbol.toUpperCase().includes(queryUpper);
                    for (const r of records) {
                        const tagMatch = !symbolMatch && (r.tags || []).some(t => t.includes(query));
                        if (symbolMatch || tagMatch) {
                            results.push({ symbol, ...r });
                        }
                    }
                }

                if (results.length === 0) {
                    panel.innerHTML = `<h3>搜索结果: "${esc(query)}"</h3><p class="search-loading">未在任何历史记录中找到匹配的代币或标签。</p>`;
                } else {
                    let html = `<h3>搜索结果: "${esc(query)}" — 共 ${results.length} 条记录</h3>`;
                    html += results.map(r => {
                        const changeCls = r.change_pct >= 0 ? 'price-up' : 'price-down';
                        const changeSign = r.change_pct >= 0 ? '+' : '';
                        return `<div class="search-result-item" onclick="loadScan(${r.scanId})">
                            <span class="sr-symbol">${esc(r.symbol)}</span>
                            <span class="sr-time">${esc(r.scanTime)}</span>
                            <span class="sr-price ${changeCls}">${fmtPrice(r.price)} (${changeSign}${r.change_pct}%)</span>
                            <div class="sr-tags">${buildTags(r.tags)}</div>
                        </div>`;
                    }).join('');
                    panel.innerHTML = html;
                }

                searchActive = true;
                document.getElementById('btnClearSearch').classList.remove('hidden');
            } catch (e) {
                console.error(e);
                panel.innerHTML = '<h3>搜索结果</h3><p class="search-loading">搜索失败，请重试。</p>';
            }
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').classList.add('hidden');
            document.getElementById('btnClearSearch').classList.add('hidden');
            searchActive = false;
        }

        // ── 自动刷新 ──
        let autoRefreshTimer = null;
        const AUTO_REFRESH_INTERVAL = 60 * 1000; // 每60秒检查一次

        function startAutoRefresh() {
            if (autoRefreshTimer) return;
            autoRefreshTimer = setInterval(async () => {
                try {
                    const data = await cachedFetch('/api/latest', true);
                    if (data.scanTime && currentData && data.scanTime !== currentData.scanTime) {
                        currentData = data;
                        renderData(data);
                        hydrateCryptoMintScores(data, false).then(() => startCryptoMintPolling(data));
                        showToast('数据已自动更新');
                    }
                } catch (e) { /* 静默失败 */ }
            }, AUTO_REFRESH_INTERVAL);
        }

        // Init
        loadLatest();
        startAutoRefresh();
    </script>
</body>

</html>
